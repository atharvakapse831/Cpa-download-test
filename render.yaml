services:
  - type: web
    name: cpa-media-service
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install && apt-get install -y yt-dlp || pip install yt-dlp
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SOCIAVAULT_API_KEY
        sync: false
      - key: SOCIAVAULT_BASE_URL
        sync: false
      - key: SERVICE_SECRET
        sync: false
      - key: TEMP_DIR
        value: /tmp/cpa-media
